services:
  mongodb:
    image: mongo:7
    container_name: agentic-chat-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: agentic-chat-backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: agentic_chat
      JWT_SECRET: change-me
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_ORIGIN: http://localhost:5173
    depends_on:
      - mongodb

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: agentic-chat-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_SOCKET_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  mongo_data:
