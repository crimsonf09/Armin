services:
  mongodb:
    image: mongo:7
    container_name: agentic-chat-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  qdrant:
    image: qdrant/qdrant:v1.14.1
    container_name: agentic-chat-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: agentic-chat-backend
    ports:
      - "8000:8000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DB: agentic_chat
      JWT_SECRET: change-me
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      FRONTEND_ORIGIN: http://localhost:5173
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: chat_knowledge
      QDRANT_VECTOR_SIZE: 1536
    depends_on:
      - mongodb
      - qdrant

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: agentic-chat-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_SOCKET_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  mongo_data:
  qdrant_data: